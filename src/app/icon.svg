<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <clipPath id="icon-mask">
      <rect width="512" height="512" rx="128"/>
    </clipPath>
    <linearGradient id="icon-shadow" x1="48" y1="36" x2="476" y2="480" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F0FBF6" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#F0FBF6" stop-opacity="0.04"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="128" fill="#06100E"/>
  <image
    href="/brand/brand-emblem.png"
    x="0"
    y="0"
    width="512"
    height="512"
    preserveAspectRatio="xMidYMid slice"
    clip-path="url(#icon-mask)"
  />
  <rect x="20" y="20" width="472" height="472" rx="108" stroke="url(#icon-shadow)" stroke-width="8"/>
</svg>
