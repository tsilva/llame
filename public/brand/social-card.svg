<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none">
  <defs>
    <clipPath id="card-mask">
      <rect width="1200" height="630" rx="44"/>
    </clipPath>
    <linearGradient id="left-fade" x1="0" y1="0" x2="680" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#06100E"/>
      <stop offset="0.72" stop-color="#06100E" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#06100E" stop-opacity="0.22"/>
    </linearGradient>
    <linearGradient id="bottom-surface" x1="0" y1="630" x2="1200" y2="500" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0E2B23" stop-opacity="0.72"/>
      <stop offset="1" stop-color="#0E2B23" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" rx="44" fill="#06100E"/>
  <image
    href="social-plate.png"
    x="0"
    y="0"
    width="1200"
    height="630"
    preserveAspectRatio="xMidYMid slice"
    clip-path="url(#card-mask)"
  />
  <rect width="1200" height="630" rx="44" fill="url(#left-fade)"/>
  <rect width="1200" height="630" rx="44" fill="url(#bottom-surface)"/>

  <g opacity="0.08">
    <path d="M0 126H1200M0 220H1200M0 314H1200M0 408H1200M0 502H1200" stroke="#D9F6EC" stroke-width="1"/>
    <path d="M150 0V630M300 0V630M450 0V630M600 0V630M750 0V630M900 0V630M1050 0V630" stroke="#D9F6EC" stroke-width="1"/>
  </g>

  <text x="72" y="102" fill="#A9C1B8" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="700" letter-spacing="6">PRIVATE BROWSER AI</text>
  <text x="72" y="278" fill="#F6F8F6" font-family="Helvetica, Arial, sans-serif" font-size="84" font-weight="700">
    <tspan x="72" dy="0">Run LLMs locally.</tspan>
    <tspan x="72" dy="92">Keep prompts private.</tspan>
  </text>
  <text x="72" y="454" fill="#C8D5D0" font-family="Helvetica, Arial, sans-serif" font-size="30" font-weight="500">
    <tspan x="72" dy="0">Browser-native chat for Qwen, Llama, and ONNX models,</tspan>
    <tspan x="72" dy="42">with WebGPU acceleration and a WASM fallback.</tspan>
  </text>

  <g>
    <rect x="72" y="534" width="182" height="44" rx="22" fill="#FFFFFF" fill-opacity="0.08" stroke="#FFFFFF" stroke-opacity="0.1" stroke-width="2"/>
    <text x="163" y="562" text-anchor="middle" fill="#EEF4F1" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="700">WebGPU + WASM</text>
    <rect x="270" y="534" width="162" height="44" rx="22" fill="#FFFFFF" fill-opacity="0.08" stroke="#FFFFFF" stroke-opacity="0.1" stroke-width="2"/>
    <text x="351" y="562" text-anchor="middle" fill="#EEF4F1" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="700">ONNX models</text>
    <rect x="448" y="534" width="192" height="44" rx="22" fill="#FFFFFF" fill-opacity="0.08" stroke="#FFFFFF" stroke-opacity="0.1" stroke-width="2"/>
    <text x="544" y="562" text-anchor="middle" fill="#EEF4F1" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="700">On-device prompts</text>
  </g>
</svg>
